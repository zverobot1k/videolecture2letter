services:
  frontend:
    image: node:20-alpine
    container_name: softwarepr-frontend
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]

  redis:
    image: redis:7-alpine
    container_name: softwarepr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: softwarepr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softwarepr-backend
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_SUMMARY_MODEL: ${OLLAMA_SUMMARY_MODEL:-gemma3:1b}
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
    command: ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softwarepr-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_SUMMARY_MODEL: ${OLLAMA_SUMMARY_MODEL:-gemma3:1b}
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
    command: ["python", "-m", "backend.worker"]

volumes:
  ollama_data:
  frontend_node_modules:
