services:
  frontend:
    image: node:20-alpine
    container_name: softwarepr-frontend
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]

  redis:
    image: redis:7-alpine
    container_name: softwarepr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: softwarepr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softwarepr-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/softwareprdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-2}
      DEFAULT_TOKEN_BALANCE: ${DEFAULT_TOKEN_BALANCE:-100}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_SUMMARY_MODEL: ${OLLAMA_SUMMARY_MODEL:-gemma3:1b}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./database:/app/database
      - ./downloads:/app/downloads
    command:
      [
        "sh",
        "-c",
        "pip install --no-cache-dir sqlalchemy==2.0.44 psycopg2-binary==2.9.11 'python-jose[cryptography]==3.5.0' passlib==1.7.4 && python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000",
      ]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softwarepr-worker
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/softwareprdb
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-2}
      DEFAULT_TOKEN_BALANCE: ${DEFAULT_TOKEN_BALANCE:-100}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_SUMMARY_MODEL: ${OLLAMA_SUMMARY_MODEL:-gemma3:1b}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./database:/app/database
      - ./downloads:/app/downloads
    command:
      [
        "sh",
        "-c",
        "pip install --no-cache-dir sqlalchemy==2.0.44 psycopg2-binary==2.9.11 'python-jose[cryptography]==3.5.0' passlib==1.7.4 && python -m backend.worker",
      ]

  postgres:
    image: postgres:16-alpine
    container_name: softwarepr-postgres
    environment:
      POSTGRES_DB: softwareprdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d softwareprdb"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  ollama_data:
  frontend_node_modules:
